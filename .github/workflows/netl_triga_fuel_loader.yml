name: netl_triga_fuel_loader Testing

on:
  push:
  pull_request:
  schedule:
    # Run every day at 8:00 AM UTC (3:00 AM CDT)
    - cron: '0 8 * * *'

jobs:
  # Fast feedback on every push/PR: lint + the pure-Python tests that do not
  # need the OpenMC/CoreForge stack. Installs the package without its heavy deps.
  # As the engine grows imports of openmc/coreforge, tests requiring them should
  # be marked and left to the integration job below.
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install (no heavy deps) + tooling
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pylint
        python -m pip install -e . --no-deps

    - name: Lint
      run: python -m pylint ./netl_triga_fuel_loader

    - name: Smoke tests
      run: pytest tests/ || [ $? -eq 5 ] || exit $?

  # Heavy integration: full conda + OpenMC stack with the model libraries built
  # from their repos. Runs on pushes and the daily schedule (not the PR event, to
  # avoid duplicating the push run).
  integration:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set Up Python and Conda
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: 3.11
        channels: conda-forge

    - name: Set Up and Configure Environment
      run: |
        conda install -n base -y mamba -c conda-forge
        mamba create -n openmc-env -y python=3.11 openmc hdf5 mpi4py numpy scipy pandas -c conda-forge
        source $(conda info --base)/etc/profile.d/conda.sh && conda activate openmc-env
        python -m pip install pylint pytest

    - name: Install MPACTPy from Repo
      run: |
        source $(conda info --base)/etc/profile.d/conda.sh && conda activate openmc-env
        cd /tmp
        git clone https://github.com/UT-Computational-NE/MPACTPy.git
        cd MPACTPy
        python -m pip install .

    - name: Install CoreForge from Repo
      run: |
        source $(conda info --base)/etc/profile.d/conda.sh && conda activate openmc-env
        cd /tmp
        git clone https://github.com/UT-Computational-NE/CoreForge.git
        cd CoreForge
        python -m pip install .

    - name: Install progression_problems from Repo
      run: |
        source $(conda info --base)/etc/profile.d/conda.sh && conda activate openmc-env
        cd /tmp
        git clone https://github.com/UT-Computational-NE/progression_problems.git
        cd progression_problems
        python -m pip install .

    - name: Install and Test netl_triga_fuel_loader
      run: |
        source $(conda info --base)/etc/profile.d/conda.sh && conda activate openmc-env
        python -m pip install .
        pytest tests/ || [ $? -eq 5 ] || exit $?
        python -m pylint ./netl_triga_fuel_loader
