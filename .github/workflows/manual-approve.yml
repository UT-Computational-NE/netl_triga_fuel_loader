name: Manual Approve PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to approve'
        required: true
        type: number
      message:
        description: 'Approval message'
        required: false
        default: 'Approved by bot per request'

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR via bot token
        env:
          BOT_TOKEN: ${{ secrets.NPL436_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          MESSAGE: ${{ github.event.inputs.message }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then
            echo "BOT_TOKEN secret not set; aborting.";
            exit 1;
          fi
          echo "Approving PR #$PR_NUMBER on $REPO"
          curl -sS -H "Authorization: token $BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"body\": \"$MESSAGE\", \"event\": \"APPROVE\"}" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews" | jq -C '.' || true
