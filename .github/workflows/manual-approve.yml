name: Manual Approve PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to approve'
        required: true
        type: number
      message:
        description: 'Approval message'
        required: false
        default: 'Approved by bot per request'

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR via bot token (github-script)
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.NPL436_BOT_TOKEN }}
          script: |
            const pr = parseInt('${{ github.event.inputs.pr_number }}', 10);
            const message = '${{ github.event.inputs.message }}' || 'Approved by bot per request';
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
              event: 'APPROVE',
              body: message
            });
